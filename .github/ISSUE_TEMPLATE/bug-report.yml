name: Bug Report
description: Something produced wrong output or failed
labels: ["bug"]
body:
  - type: textarea
    id: trigger
    attributes:
      label: How to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.0.0"
